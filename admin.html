<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel de administración · Vacío Lleno</title>
<link rel="icon" href="favicon.png">

<style>
  :root {
    --navy: #0f1f3d;
    --navy-mid: #1a3260;
    --navy-light: #243f78;
    --white: #f5f3ee;
    --cream: #ede9df;
    --gold: #c9a84c;
    --red: #c0392b;
    --green: #00d4a1;
    --mono: 'DM Mono', monospace;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans), system-ui, sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }

  /* ═══ LOGIN ═══ */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 30%, var(--navy-mid), var(--navy));
    padding: 2rem;
  }
  .login-box {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    padding: 3rem; max-width: 400px; width: 100%;
  }
  .login-box h1 { font-family: var(--serif); font-size: 1.8rem; margin-bottom: 0.5rem; text-align: center; }
  .login-box .subt { color: rgba(255,255,255,0.5); font-size: 0.75rem; margin-bottom: 2rem; font-family: var(--mono); letter-spacing: 0.05em; text-align: center; }
  .login-box label { display: block; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 0.4rem; margin-top: 1rem; }
  .login-box input {
    width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); color: var(--white); font-family: var(--mono);
    font-size: 0.9rem;
  }
  .login-box input:focus { outline: none; border-color: var(--gold); }
  .login-box button {
    width: 100%; padding: 0.9rem; margin-top: 1.5rem; background: var(--gold); color: var(--navy);
    border: none; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; font-weight: bold; cursor: pointer; transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.85; }
  .login-box button:disabled { opacity: 0.5; cursor: wait; }
  .login-error { color: #ff6b7a; font-size: 0.8rem; margin-top: 1rem; font-family: var(--mono); text-align: center; }

  /* ═══ APP ═══ */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar {
    background: rgba(0,0,0,0.25); border-right: 1px solid rgba(255,255,255,0.06);
    padding: 1.5rem 0; position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
  }
  .brand {
    padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06);
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em; color: var(--gold);
    text-transform: uppercase;
  }
  .brand small { display: block; color: rgba(255,255,255,0.4); font-size: 0.6rem; margin-top: 0.3rem; }
  .nav { list-style: none; padding: 1rem 0; flex: 1; overflow-y: auto; }
  .nav li {
    padding: 0.75rem 1.5rem; font-family: var(--mono); font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
    color: rgba(255,255,255,0.6); border-left: 2px solid transparent;
    transition: all 0.15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav li:hover { background: rgba(255,255,255,0.03); color: var(--white); }
  .nav li.active { background: rgba(201,168,76,0.1); color: var(--gold); border-left-color: var(--gold); }
  .nav li.hidden { display: none; }
  .nav-badge { background: var(--red); color: white; font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 10px; font-family: var(--mono); }
  .user-info {
    padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.06);
    font-family: var(--mono); font-size: 0.7rem;
  }
  .user-name { color: var(--white); font-weight: bold; margin-bottom: 0.15rem; }
  .user-email { color: rgba(255,255,255,0.4); font-size: 0.65rem; word-break: break-all; }
  .logout {
    margin: 0.75rem 1.5rem 0; padding: 0.5rem;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6); font-family: var(--mono); font-size: 0.65rem;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    width: calc(100% - 3rem);
  }
  .logout:hover { background: rgba(255,71,87,0.1); color: var(--red); border-color: var(--red); }

  .main { padding: 2rem 3rem; overflow-x: auto; }
  .page-title { font-family: var(--serif); font-size: 2rem; margin-bottom: 0.3rem; }
  .page-subtitle { font-family: var(--mono); font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; margin-bottom: 2rem; }

  /* Resumen */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .summary-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); padding: 1.5rem; }
  .summary-card .label { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; }
  .summary-card .value { font-family: var(--serif); font-size: 2.2rem; font-weight: 700; }
  .summary-card.alert { border-color: var(--gold); }
  .summary-card.alert .value { color: var(--gold); }

  /* Toolbar & Tabla */
  .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn {
    padding: 0.6rem 1.2rem; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; background: var(--gold); color: var(--navy);
    border: none; font-weight: bold;
  }
  .btn.ghost { background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); }
  .btn.ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn.danger { background: var(--red); color: white; }
  .btn.sm { padding: 0.4rem 0.8rem; font-size: 0.65rem; }
  .btn.active { background: var(--gold); color: var(--navy); }

  .table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); font-size: 0.85rem; }
  .table th { background: rgba(0,0,0,0.3); padding: 0.75rem 1rem; text-align: left; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); font-weight: normal; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .table td { padding: 0.9rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
  .table tr:hover td { background: rgba(255,255,255,0.02); }
  .table td small { display: block; font-family: var(--mono); font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem; }
  .empty { padding: 3rem; text-align: center; color: rgba(255,255,255,0.4); font-style: italic; }

  .badge { display: inline-block; padding: 0.2rem 0.6rem; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 3px; }
  .badge.nuevo { background: rgba(74,158,255,0.15); color: #4a9eff; }
  .badge.en_contacto { background: rgba(201,168,76,0.15); color: var(--gold); }
  .badge.entrevistado { background: rgba(162,155,254,0.15); color: #a29bfe; }
  .badge.aprobado { background: rgba(0,212,161,0.15); color: var(--green); }
  .badge.rechazado { background: rgba(255,71,87,0.15); color: #ff4757; }
  .badge.recibido, .badge.clasificado, .badge.perforado, .badge.en_transito, .badge.entregado, .badge.en_circulacion { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 2rem; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.1); max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; }
  .modal h2 { font-family: var(--serif); font-size: 1.4rem; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 0.4rem; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.7rem 0.9rem; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); color: var(--white); font-family: var(--sans); font-size: 0.9rem; }
  .form-group textarea { resize: vertical; min-height: 80px; font-family: var(--sans); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }
  .checkbox-wrap { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; }
  .checkbox-wrap input { width: auto; }

  .perm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; background: rgba(0,0,0,0.2); padding: 1rem; border: 1px solid rgba(255,255,255,0.06); }
  .perm-grid .checkbox-wrap { padding: 0.3rem 0.6rem; margin: 0; }
  .perm-grid .checkbox-wrap label { margin: 0; text-transform: none; letter-spacing: 0; font-family: var(--sans); font-size: 0.85rem; color: rgba(255,255,255,0.85); }
  .perm-grid .checkbox-wrap.admin-perm label { color: var(--gold); font-weight: bold; }

  .msg { padding: 0.75rem 1rem; margin-bottom: 1rem; font-family: var(--mono); font-size: 0.75rem; }
  .msg.error { background: rgba(255,71,87,0.1); color: #ff6b7a; border-left: 3px solid #ff4757; }
  .msg.ok { background: rgba(0,212,161,0.1); color: var(--green); border-left: 3px solid var(--green); }

  .loading { padding: 3rem; text-align: center; opacity: 0.5; font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.1em; }

  .perm-badges { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .perm-badge { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); padding: 0.15rem 0.5rem; font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .perm-badge.admin { background: rgba(201,168,76,0.2); color: var(--gold); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .main { padding: 1.5rem; }
    .form-row { grid-template-columns: 1fr; }
    .perm-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>Vacío Lleno</h1>
    <div class="subt">Panel de administración</div>
    <label>Email</label>
    <input type="email" id="emailInput" autocomplete="email" autofocus>
    <label>Contraseña</label>
    <input type="password" id="pwdInput" autocomplete="current-password">
    <button id="loginBtn" onclick="hacerLogin()">Entrar</button>
    <div id="loginError" class="login-error" style="display:none;"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">
  <aside class="sidebar">
    <div class="brand">
      ● Vacío Lleno
      <small>Panel admin</small>
    </div>
    <ul class="nav" id="nav">
      <li data-seccion="resumen" data-permiso="" class="active">Resumen</li>
      <li data-seccion="formularios" data-permiso="formularios">Formularios <span class="nav-badge" id="badgeFormularios" style="display:none;"></span></li>
      <li data-seccion="voluntarios" data-permiso="voluntarios">Voluntarios</li>
      <li data-seccion="libros" data-permiso="libros">Libros</li>
      <li data-seccion="resenas" data-permiso="resenas">Reseñas</li>
      <li data-seccion="organizaciones" data-permiso="organizaciones">Organizaciones</li>
      <li data-seccion="wishlist" data-permiso="libros">Wishlist</li>
      <li data-seccion="usuarios" data-permiso="admin">Usuarios</li>
    </ul>
    <div class="user-info">
      <div class="user-name" id="userName">—</div>
      <div class="user-email" id="userEmail">—</div>
    </div>
    <button class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
  </aside>
  <main class="main" id="main">
    <div class="loading">Cargando...</div>
  </main>
</div>

<!-- MODAL -->
<div id="modal" class="modal-backdrop" onclick="cerrarModalSiFuera(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://tuagkbjixoolmtmwwsus.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_VFoLqoJsalIKNJ2GFpSbzA_QS5RH4-U';

// ═══════════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════════════
let TOKEN = sessionStorage.getItem('vl_admin_token') || '';
let PERFIL = null;  // { email, nombre, permisos: [...] }
let filtroFormularios = '';

// ═══════════════════════════════════════════════════════════════════
// COMUNICACIÓN CON /api/admin
// ═══════════════════════════════════════════════════════════════════
async function api(accion, datos = {}) {
  const res = await fetch('/api/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ access_token: TOKEN, accion, datos }),
  });
  const json = await res.json();
  if (!res.ok) {
    if (res.status === 401) {
      sessionStorage.removeItem('vl_admin_token');
      TOKEN = ''; PERFIL = null;
      mostrarLogin();
      throw new Error('Sesión expirada — inicia sesión de nuevo');
    }
    throw new Error(json.error || 'Error del servidor');
  }
  return json;
}

// ═══════════════════════════════════════════════════════════════════
// LOGIN / LOGOUT (Supabase Auth)
// ═══════════════════════════════════════════════════════════════════
async function hacerLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pwd = document.getElementById('pwdInput').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  if (!email || !pwd) return;
  btn.disabled = true; btn.textContent = 'Verificando...';
  err.style.display = 'none';

  try {
    // Login contra Supabase Auth
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password: pwd }),
    });
    const data = await res.json();
    if (!res.ok || !data.access_token) {
      throw new Error(data.error_description || data.msg || 'Email o contraseña incorrectos');
    }
    TOKEN = data.access_token;

    // Verificar que tiene perfil de admin activo
    const { data: perfil } = await api('mi_perfil');
    PERFIL = perfil;

    sessionStorage.setItem('vl_admin_token', TOKEN);
    mostrarApp();
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    TOKEN = ''; PERFIL = null;
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function cerrarSesion() {
  sessionStorage.removeItem('vl_admin_token');
  TOKEN = ''; PERFIL = null;
  location.reload();
}

function mostrarLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function mostrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'grid';

  // Mostrar info del usuario
  document.getElementById('userName').textContent = PERFIL.nombre || 'Sin nombre';
  document.getElementById('userEmail').textContent = PERFIL.email;

  // Ocultar pestañas sin permiso
  document.querySelectorAll('.nav li').forEach(li => {
    const permiso = li.dataset.permiso;
    if (!permiso) { li.classList.remove('hidden'); return; }
    if (PERFIL.permisos.includes('admin') || PERFIL.permisos.includes(permiso)) {
      li.classList.remove('hidden');
    } else {
      li.classList.add('hidden');
    }
  });

  cargarSeccion('resumen');
}

document.getElementById('pwdInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') hacerLogin(); });
document.getElementById('emailInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pwdInput').focus(); });

document.getElementById('nav').addEventListener('click', (e) => {
  const li = e.target.closest('li');
  if (!li || li.classList.contains('hidden')) return;
  document.querySelectorAll('.nav li').forEach(x => x.classList.remove('active'));
  li.classList.add('active');
  cargarSeccion(li.dataset.seccion);
});

// ═══════════════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════════════
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fecha(iso) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' }); }
function mostrarMsg(html, tipo = 'ok') {
  const main = document.getElementById('main');
  const msg = document.createElement('div');
  msg.className = 'msg ' + tipo;
  msg.textContent = html;
  main.insertBefore(msg, main.firstChild);
  setTimeout(() => msg.remove(), 5000);
}
function abrirModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('modal').classList.add('open'); }
function cerrarModal() { document.getElementById('modal').classList.remove('open'); }
function cerrarModalSiFuera(e) { if (e.target.id === 'modal') cerrarModal(); }

function puedo(permiso) {
  if (!PERFIL) return false;
  return PERFIL.permisos.includes('admin') || PERFIL.permisos.includes(permiso);
}

// ═══════════════════════════════════════════════════════════════════
// SECCIÓN: RESUMEN
// ═══════════════════════════════════════════════════════════════════
async function cargarResumen() {
  document.getElementById('main').innerHTML = '<div class="loading">Cargando resumen...</div>';
  try {
    const { data } = await api('resumen');
    const badge = document.getElementById('badgeFormularios');
    if (data.formularios_nuevos > 0) { badge.textContent = data.formularios_nuevos; badge.style.display = 'inline-block'; }
    else badge.style.display = 'none';

    document.getElementById('main').innerHTML = `
      <h1 class="page-title">Bienvenido/a, ${esc(PERFIL.nombre || PERFIL.email.split('@')[0])}</h1>
      <div class="page-subtitle">Vista general del proyecto</div>
      <div class="summary-grid">
        <div class="summary-card ${data.formularios_nuevos > 0 ? 'alert' : ''}">
          <div class="label">Formularios nuevos</div>
          <div class="value">${data.formularios_nuevos}</div>
        </div>
        <div class="summary-card"><div class="label">Voluntarios publicados</div><div class="value">${data.voluntarios_publicados}</div></div>
        <div class="summary-card"><div class="label">Libros total</div><div class="value">${data.libros_total}</div></div>
        <div class="summary-card"><div class="label">Reseñas</div><div class="value">${data.resenas_total}</div></div>
        <div class="summary-card"><div class="label">Donaciones confirmadas</div><div class="value">${data.donaciones_confirmadas}</div></div>
      </div>
      ${(data.formularios_nuevos > 0 && puedo('formularios')) ? `
        <div style="margin-top:2rem;padding:1.5rem;background:rgba(201,168,76,0.06);border-left:3px solid var(--gold);">
          Tienes <strong>${data.formularios_nuevos}</strong> ${data.formularios_nuevos === 1 ? 'formulario nuevo' : 'formularios nuevos'} sin revisar.
          <button class="btn sm" style="margin-left:1rem;" onclick="document.querySelector('[data-seccion=formularios]').click()">Ir a formularios →</button>
        </div>
      ` : ''}
    `;
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="msg error">${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════
// SECCIÓN: FORMULARIOS
// ═══════════════════════════════════════════════════════════════════
const ESTADOS = ['nuevo', 'en_contacto', 'entrevistado', 'aprobado', 'rechazado'];
const ESTADO_LABEL = { nuevo:'Nuevo', en_contacto:'En contacto', entrevistado:'Entrevistado', aprobado:'Aprobado', rechazado:'Rechazado' };

async function cargarFormularios() {
  document.getElementById('main').innerHTML = '<div class="loading">Cargando formularios...</div>';
  try {
    const { data } = await api('formularios_listar', filtroFormularios ? { estado: filtroFormularios } : {});
    const filtros = ['', ...ESTADOS].map(e => {
      const label = e === '' ? 'Todos' : ESTADO_LABEL[e];
      const active = e === filtroFormularios ? 'active' : '';
      return `<button class="btn ghost sm ${active}" onclick="filtrarFormularios('${e}')">${label}</button>`;
    }).join('');
    document.getElementById('main').innerHTML = `
      <h1 class="page-title">Formularios recibidos</h1>

const PERMISOS_DISPONIBLES = [

  abrirModal(`

    <div class="form-group"><label>Nombre (opcional)</label><input type="text" id="uNombre" placeholder="Cómo se le va a llamar"></div>
    <div class="form-group">
      <label>Permisos</label>
      <div class="perm-grid">
        ${PERMISOS_DISPONIBLES.map(([k, v]) => `
          <div class="checkbox-wrap ${k === 'admin' ? 'admin-perm' : ''}">

      <button class="btn" onclick="confirmarInvitacion()">Enviar invitación</button>
    </div>
  `);
}

async function confirmarInvitacion() {
  const email = document.getElementById('uEmail').value.trim();
  const nombre = document.getElementById('uNombre').value.trim();
  const permisos = PERMISOS_DISPONIBLES
    .map(([k]) => k)
    .filter(k => document.getElementById('perm_' + k).checked);
  if (!email || !email.includes('@')) { mostrarMsg('Email no válido', 'error'); return; }
  if (permisos.length === 0) { mostrarMsg('Marca al menos un permiso', 'error'); return; }
  try {
    const r = await api('usuarios_invitar', { email, nombre, permisos });
    cerrarModal(); cargarUsuarios(); mostrarMsg(r.mensaje || 'Invitación enviada', 'ok');
  } catch (e) { mostrarMsg(e.message, 'error'); }
}

async function editarUsuario(user_id) {
  const { data } = await api('usuarios_listar');
  const u = data.find(x => x.user_id === user_id);
  if (!u) return;
  const permisosActuales = u.permisos || [];
  abrirModal(`
    <h2>Permisos de ${esc(u.email)}</h2>
    <div class="form-group"><label>Nombre</label><input type="text" id="uNombreEdit" value="${esc(u.nombre || '')}"></div>
    <div class="form-group">
      <label>Permisos</label>
      <div class="perm-grid">
        ${PERMISOS_DISPONIBLES.map(([k, v]) => `
          <div class="checkbox-wrap ${k === 'admin' ? 'admin-perm' : ''}">
            <input type="checkbox" id="perm_${k}" value="${k}" ${permisosActuales.includes(k) ? 'checked' : ''}>
            <label for="perm_${k}">${esc(v)}</label>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="form-actions">
      <button class="btn ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn" onclick='guardarPermisosUsuario(${JSON.stringify(user_id)})'>Guardar</button>
    </div>
  `);
}

async function guardarPermisosUsuario(user_id) {
  const nombre = document.getElementById('uNombreEdit').value.trim();
  const permisos = PERMISOS_DISPONIBLES
    .map(([k]) => k)
    .filter(k => document.getElementById('perm_' + k).checked);
  if (permisos.length === 0) { mostrarMsg('Marca al menos un permiso', 'error'); return; }
  try {
    await api('usuarios_actualizar_permisos', { user_id, permisos, nombre });
    cerrarModal(); cargarUsuarios(); mostrarMsg('Permisos actualizados', 'ok');
    // Si me estoy editando a mí mismo, refrescar mi perfil
    if (user_id === PERFIL.user_id) {
      const { data: nuevoPerfil } = await api('mi_perfil');
      PERFIL = nuevoPerfil;
      mostrarApp();
    }
  } catch (e) { mostrarMsg(e.message, 'error'); }
}

async function desactivarUsuario(user_id, email) {
  if (!confirm(`¿Desactivar el acceso de ${email}? Podrá reactivarse más tarde.`)) return;
  try { await api('usuarios_desactivar', { user_id }); cargarUsuarios(); mostrarMsg('Usuario desactivado', 'ok'); }
  catch (e) { mostrarMsg(e.message, 'error'); }
}

async function activarUsuario(user_id) {
  try { await api('usuarios_activar', { user_id }); cargarUsuarios(); mostrarMsg('Usuario reactivado', 'ok'); }
  catch (e) { mostrarMsg(e.message, 'error'); }
}

// ═══════════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════════
function cargarSeccion(nombre) {
  switch (nombre) {
    case 'resumen': return cargarResumen();
    case 'formularios': return cargarFormularios();
    case 'voluntarios': return cargarVoluntarios();
    case 'libros': return cargarLibros();
    case 'resenas': return cargarResenas();
    case 'organizaciones': return cargarOrganizaciones();
    case 'wishlist': return cargarWishlist();
    case 'usuarios': return cargarUsuarios();
  }
}

// ═══════════════════════════════════════════════════════════════════
// PANTALLA DE ESTABLECER CONTRASEÑA (invitación / recovery)
// ═══════════════════════════════════════════════════════════════════
function mostrarSetupPassword(accessToken) {
  const login = document.getElementById('loginScreen');
  const app = document.getElementById('app');
  app.style.display = 'none';
  login.style.display = 'flex';
  login.querySelector('.login-box').innerHTML = `
    <h1>Vacío Lleno</h1>
    <div class="subt">Establece tu contraseña</div>
    <p style="color:rgba(255,255,255,0.6);font-size:0.8rem;line-height:1.6;margin-bottom:1rem;">
      Bienvenido/a al equipo. Elige una contraseña para acceder al panel de administración.
    </p>
    <label>Contraseña nueva</label>
    <input type="password" id="newPwd1" autocomplete="new-password" autofocus>
    <label>Repite la contraseña</label>
    <input type="password" id="newPwd2" autocomplete="new-password">
    <button id="setupBtn" onclick="establecerPassword('${accessToken}')">Establecer y entrar</button>
    <div id="setupError" class="login-error" style="display:none;"></div>
  `;
  history.replaceState(null, '', window.location.pathname);  // limpiar el hash
}

async function establecerPassword(accessToken) {
  const p1 = document.getElementById('newPwd1').value;
  const p2 = document.getElementById('newPwd2').value;
  const btn = document.getElementById('setupBtn');
  const err = document.getElementById('setupError');
  err.style.display = 'none';
  if (p1.length < 8) { err.textContent = 'La contraseña debe tener al menos 8 caracteres.'; err.style.display = 'block'; return; }
  if (p1 !== p2) { err.textContent = 'Las contraseñas no coinciden.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ password: p1 }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'No se pudo establecer la contraseña.');

    // Entrar con el token que ya tenemos
    TOKEN = accessToken;
    sessionStorage.setItem('vl_admin_token', TOKEN);
    const { data: perfil } = await api('mi_perfil');
    PERFIL = perfil;
    location.reload();  // Recargar para restaurar la pantalla de login normal
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Establecer y entrar';
  }
}

// ═══════════════════════════════════════════════════════════════════
// ARRANQUE
// ═══════════════════════════════════════════════════════════════════
(function arrancar() {
  // Detectar si venimos desde un link de invitación/recovery
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const hashToken = hash.get('access_token');
  const hashType = hash.get('type');
  if (hashToken && (hashType === 'recovery' || hashType === 'invite' || hashType === 'signup')) {
    mostrarSetupPassword(hashToken);
    return;
  }

  // Arranque normal
  if (TOKEN) {
    api('mi_perfil').then(({ data }) => { PERFIL = data; mostrarApp(); }).catch(() => {
      sessionStorage.removeItem('vl_admin_token');
      TOKEN = '';
      mostrarLogin();
    });
  } else {
    mostrarLogin();
  }
})();
</script>
