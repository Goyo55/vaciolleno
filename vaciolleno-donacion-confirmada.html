<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Confirmación de donación · Vacío Lleno" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://vaciolleno.org/vaciolleno-donacion-confirmada.html" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
  <meta name="theme-color" content="#0f1f3d" />
  <title>Gracias — Vacío Lleno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1f3d; --navy-mid: #1a3260; --navy-light: #243f78;
      --white: #f5f3ee; --cream: #ede9df; --gold: #c9a84c; --red: #c0392b;
      --mono: 'DM Mono', monospace;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }
    body {
      background: var(--navy); color: var(--white);
      font-family: var(--sans); font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 4rem;
      background: rgba(15,31,61,0.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .nav-logo-text { font-family: var(--serif); font-size: 1.1rem; font-weight: 700; color: var(--white); letter-spacing: 0.05em; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(245,243,238,0.5); text-decoration: none; }
    .nav-links a:hover { color: var(--gold); }
    @media (max-width: 900px) { .nav-links { display: none; } nav { padding: 1.25rem 1.5rem; } }

    /* MAIN */
    .page {
      flex: 1; padding: 10rem 2rem 4rem;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      max-width: 640px; width: 100%; text-align: center;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 4rem 3rem;
    }

    /* LOADING */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 3rem 0; }
    .spinner-large {
      width: 40px; height: 40px;
      border: 2px solid rgba(201,168,76,0.15);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(245,243,238,0.4);
    }

    /* HOLE ICON */
    .hole-icon {
      width: 90px; height: 90px; margin: 0 auto 2rem;
      border-radius: 50%; border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      animation: pulseHole 2.5s ease-in-out infinite;
    }
    @keyframes pulseHole { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.35); } 50% { box-shadow: 0 0 0 22px rgba(201,168,76,0); } }

    /* SUCCESS */
    .eyebrow {
      font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 1rem;
    }
    .eyebrow::before, .eyebrow::after { content: ''; display: block; width: 30px; height: 1px; background: var(--gold); }

    .title {
      font-family: var(--serif); font-size: clamp(2.4rem, 4vw, 3.5rem);
      font-weight: 900; line-height: 1.05; margin-bottom: 1.5rem;
    }

    .subtitle {
      font-size: 1rem; line-height: 1.75; color: rgba(245,243,238,0.7);
      max-width: 480px; margin: 0 auto 2.5rem;
    }
    .subtitle strong { color: var(--white); font-weight: 500; }

    /* CÓDIGO PRINCIPAL */
    .codigo-block {
      background: rgba(201,168,76,0.06);
      border: 1px solid var(--gold);
      padding: 2.5rem 2rem; margin-bottom: 2.5rem;
    }
    .codigo-label {
      font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
    }
    .codigo-valor {
      font-family: var(--serif); font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 900; color: var(--white); letter-spacing: 0.02em;
      margin-bottom: 1rem; line-height: 1;
    }
    .codigo-nota {
      font-family: var(--sans); font-size: 0.85rem;
      color: rgba(245,243,238,0.55); max-width: 400px;
      margin: 0 auto; line-height: 1.6;
    }
    .codigo-nota strong { color: var(--gold); font-weight: 500; }

    /* ACCIONES */
    .acciones { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
    .btn-copy {
      padding: 0.9rem 1.5rem; background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(245,243,238,0.7);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .btn-copy:hover { border-color: var(--gold); color: var(--gold); }
    .btn-copy.copiado { background: rgba(39,174,96,0.15); border-color: #27ae60; color: #27ae60; }

    .compartir { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .compartir a, .compartir button {
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.55rem 1rem;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(245,243,238,0.5); text-decoration: none;
      cursor: pointer; transition: all 0.2s;
    }
    .compartir a:hover, .compartir button:hover { border-color: var(--gold); color: var(--gold); }

    /* CTAs */
    .ctas { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary, .btn-secondary {
      padding: 1rem 2rem;
      font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.12em;
      text-transform: uppercase; text-decoration: none; transition: all 0.25s;
    }
    .btn-primary { background: var(--gold); color: var(--navy); font-weight: 500; }
    .btn-primary:hover { background: rgba(201,168,76,0.85); }
    .btn-secondary { border: 1px solid rgba(255,255,255,0.15); color: var(--white); }
    .btn-secondary:hover { border-color: var(--white); background: rgba(255,255,255,0.03); }

    /* ERROR STATE */
    .error-icon {
      width: 90px; height: 90px; margin: 0 auto 2rem;
      border-radius: 50%; border: 2px solid var(--red);
      display: flex; align-items: center; justify-content: center;
      color: var(--red); font-family: var(--serif); font-size: 2.5rem;
    }

    /* PROCESSING STATE */
    .processing-icon {
      width: 90px; height: 90px; margin: 0 auto 2rem;
      border-radius: 50%; border: 2px solid rgba(201,168,76,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .processing-icon .spinner-inner {
      width: 40px; height: 40px; border: 2px solid transparent;
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @media (max-width: 640px) {
      .card { padding: 2.5rem 1.5rem; }
      .codigo-block { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">
      <svg viewBox="0 0 60 60" fill="none" style="width:28px;height:28px;flex-shrink:0;">
        <rect x="8" y="10" width="44" height="40" rx="2" fill="#1a3260"/>
        <circle cx="30" cy="30" r="10" fill="#0f1f3d" stroke="rgba(201,168,76,0.6)" stroke-width="1.5"/>
      </svg>
      <span class="nav-logo-text">VACÍO LLENO</span>
    </a>
    <ul class="nav-links">
      <li><a href="/vaciolleno-proyecto.html">El Proyecto</a></li>
      <li><a href="/vaciolleno-libros.html">Libros</a></li>
      <li><a href="/vaciolleno-impacto.html">Impacto</a></li>
      <li><a href="/vaciolleno-donantes.html">El Muro</a></li>
      <li><a href="/blog">Blog</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="card" id="cardContainer">
      <div class="loading-wrap">
        <div class="spinner-large"></div>
        <div class="loading-text">Confirmando tu donación…</div>
      </div>
    </div>
  </div>

  <div style="background:#080f1e;padding:1.5rem 2rem;text-align:center;">
    <span style="font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;color:rgba(240,236,227,0.15);">© 2025 · vaciolleno.org · Todos los libros circulan libres</span>
  </div>

  <script>
    (function() {
      const SUPABASE_URL  = 'https://tuagkbjixoolmtmwwsus.supabase.co';
      const SUPABASE_ANON = 'sb_publishable_VFoLqoJsalIKNJ2GFpSbzA_QS5RH4-U';

      function $(id) { return document.getElementById(id); }
      function formatEur(cents) { return (cents / 100).toFixed(2).replace('.', ',') + '€'; }
      function esc(s) { if (s === null || s === undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

      const params = new URLSearchParams(window.location.search);
      const piId = params.get('payment_intent');
      const status = params.get('redirect_status');

      const container = $('cardContainer');

      // Casos de estado
      if (status === 'processing') {
        renderProcessing();
      } else if (status === 'requires_payment_method' || status === 'requires_action' || status === 'failed') {
        renderError('El pago no se completó', 'Puedes intentarlo de nuevo. Ningún cargo se realizó.');
      } else if (status === 'succeeded' && piId) {
        cargarYRenderizar(piId);
      } else if (!piId) {
        renderError('Página incorrecta', 'No hay información de donación. Si acabas de donar, revisa tu email.');
      } else {
        renderError('Estado desconocido', 'Si has completado el pago, recibirás confirmación por email en breve.');
      }

      // ─── FETCH datos de la donación ───
      async function cargarYRenderizar(pi_id) {
        try {
          // Reintentos: el webhook puede tardar unos segundos
          let donacion = null;
          for (let i = 0; i < 5; i++) {
            donacion = await fetchDonacion(pi_id);
            if (donacion && donacion.estado === 'confirmada') break;
            await sleep(1200);
          }
          if (!donacion) {
            renderError('Un momento', 'Tu pago se procesó pero aún estamos confirmando los datos. Recibirás email en breve.');
            return;
          }
          renderExito(donacion);
        } catch (err) {
          console.error(err);
          renderError('Un momento', 'Tu pago se procesó pero no hemos podido cargar los detalles. Recibirás confirmación por email.');
        }
      }

      function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

      async function fetchDonacion(pi_id) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_estado_donacion`, {
          method: 'POST',
          headers: {
            apikey: SUPABASE_ANON,
            Authorization: `Bearer ${SUPABASE_ANON}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ pi_id }),
        });
        if (!res.ok) return null;
        return await res.json();
      }

      // ─── RENDERS ───
      function renderExito(d) {
        const importeStr = formatEur(d.importe);
        const esRecurrente = d.tipo === 'mensual';
        const esAnon = d.anonimo;

        const nota = esAnon
          ? `Este importe exacto es <strong>tu firma invisible</strong> en Vacío Lleno este año. Nadie más donará exactamente esta cantidad en 2026. Es tu código, guárdalo.`
          : (esRecurrente
              ? 'Cada mes cobraremos este mismo importe automáticamente. Puedes cancelar cuando quieras respondiendo a tu email de confirmación.'
              : 'Tu donación ya está en circulación. Con esta aportación empezarán a moverse libros hacia manos que los necesitan.');

        const eyebrowTxt = esAnon
          ? (esRecurrente ? 'Donación anónima mensual confirmada' : 'Donación anónima confirmada')
          : (esRecurrente ? 'Donación mensual confirmada' : 'Donación confirmada');

        const titleTxt = esAnon ? 'Gracias.' : `Gracias${d.nombre ? ', ' + esc(d.nombre) : ''}.`;

        const compartirText = encodeURIComponent(
          esAnon
            ? `Acabo de donar ${importeStr} a Vacío Lleno. Cada donación anónima tiene un importe irrepetible. La mía existe una sola vez este año.`
            : `Acabo de donar ${importeStr} a Vacío Lleno — libros perforados que circulan libres por Latinoamérica.`
        );
        const url = encodeURIComponent('https://vaciolleno.org/vaciolleno-donaciones.html');

        container.innerHTML = `
          <div class="hole-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
              <path d="M12 20l5 5 11-11" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <div class="eyebrow">${eyebrowTxt}</div>
          <h1 class="title">${titleTxt}</h1>
          <p class="subtitle">
            ${esAnon
              ? 'Tu donación anónima ha sido procesada. Guarda bien el importe exacto — es tu huella.'
              : `Tu donación de <strong>${importeStr}</strong> ha sido procesada correctamente.`}
          </p>

          <div class="codigo-block">
            <div class="codigo-label">${esAnon ? 'Tu firma invisible' : 'Tu donación'}</div>
            <div class="codigo-valor" id="codigoValor">${importeStr}</div>
            <p class="codigo-nota">${nota}</p>
          </div>

          <div class="acciones">
            <button class="btn-copy" onclick="copiarImporte()">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="3.5" y="3.5" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
                <path d="M9.5 3.5V2a1 1 0 00-1-1h-5a1 1 0 00-1 1v7.5a1 1 0 001 1h1" stroke="currentColor" stroke-width="1.3"/>
              </svg>
              <span id="btnCopyText">Copiar ${esAnon ? 'mi importe único' : 'importe'}</span>
            </button>
          </div>

          <div class="compartir">
            <a href="https://twitter.com/intent/tweet?text=${compartirText}&url=${url}" target="_blank" rel="noopener">X / Twitter</a>
            <a href="https://api.whatsapp.com/send?text=${compartirText}%20${url}" target="_blank" rel="noopener">WhatsApp</a>
            <a href="https://www.linkedin.com/sharing/share-offsite/?url=${url}" target="_blank" rel="noopener">LinkedIn</a>
          </div>

          <p style="font-family:var(--mono);font-size:0.7rem;letter-spacing:0.05em;color:rgba(245,243,238,0.3);margin-bottom:2rem;line-height:1.6;">
            Hemos enviado la confirmación a tu email. Si no llega en unos minutos, revisa la carpeta de spam.
          </p>

          <div class="ctas">
            <a href="/vaciolleno-impacto.html" class="btn-primary">Ver impacto en vivo →</a>
            <a href="/" class="btn-secondary">Volver al inicio</a>
          </div>
        `;
      }

      function renderProcessing() {
        container.innerHTML = `
          <div class="processing-icon"><div class="spinner-inner"></div></div>
          <div class="eyebrow">Procesando</div>
          <h1 class="title">Tu pago está en proceso</h1>
          <p class="subtitle">Algunos métodos de pago tardan unos minutos. Recibirás email en cuanto se confirme.</p>
          <div class="ctas">
            <a href="/" class="btn-primary">Volver al inicio</a>
          </div>
        `;
      }

      function renderError(titulo, mensaje) {
        container.innerHTML = `
          <div class="error-icon">×</div>
          <div class="eyebrow" style="color:#e74c3c;"><span style="background:#e74c3c;"></span>${esc(titulo)}<span style="background:#e74c3c;"></span></div>
          <h1 class="title">${esc(titulo)}</h1>
          <p class="subtitle">${esc(mensaje)}</p>
          <div class="ctas">
            <a href="/vaciolleno-donaciones.html" class="btn-primary">Intentar de nuevo</a>
            <a href="/" class="btn-secondary">Volver al inicio</a>
          </div>
        `;
      }

      // ─── COPIAR AL PORTAPAPELES ───
      window.copiarImporte = function() {
        const importe = $('codigoValor').textContent.trim();
        navigator.clipboard.writeText(importe).then(() => {
          const btn = document.querySelector('.btn-copy');
          const span = $('btnCopyText');
          btn.classList.add('copiado');
          span.textContent = 'Copiado ✓';
          setTimeout(() => {
            btn.classList.remove('copiado');
            span.textContent = 'Copiar mi importe único';
          }, 2500);
        }).catch(() => {
          alert('No se pudo copiar. Cópialo manualmente: ' + importe);
        });
      };
    })();
  </script>

</body>
</html>
